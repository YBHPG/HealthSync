name: HealthSync
options:
  bundleIdPrefix: com.bulbadyshka
  developmentLanguage: en

targets:
  HealthSync:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources: [HealthSync]
    settings:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "" # Needs to be selected in Xcode or left empty for personal team auto-signing
      GENERATE_INFOPLIST_FILE: YES
      ENABLE_BITCODE: NO
      SWIFT_VERSION: 6.0
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_NSHealthShareUsageDescription: "We need access to your health data to sync it to your Android device."
      INFOPLIST_KEY_NSHealthUpdateUsageDescription: "We need access to your health data to sync it."
      INFOPLIST_KEY_NSLocalNetworkUsageDescription: "We need access to the local network to find the Android synchronization server."
      INFOPLIST_KEY_NSBonjourServices: "_http._tcp"
      INFOPLIST_KEY_NSAppTransportSecurity:
        NSAllowsArbitraryLoads: true
        NSAllowsLocalNetworking: true
    dependencies:
      - target: HealthSyncWatch

  HealthSyncWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources: [HealthSyncWatch]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.bulbadyshka.HealthSync.watchkitapp
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: 6.0
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.bulbadyshka.HealthSync
      INFOPLIST_KEY_WKWatchOnly: NO
      INFOPLIST_KEY_NSHealthShareUsageDescription: "We need access to your workout data."
      INFOPLIST_KEY_NSHealthUpdateUsageDescription: "We need access to save workout data."
      INFOPLIST_KEY_UIBackgroundModes: ["location", "workout-processing"]
