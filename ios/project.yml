name: HealthSync
options:
  bundleIdPrefix: com.bulbadyshka
  developmentLanguage: en
  postGenCommand: "sh fix_capabilities.sh"

targets:
  HealthSync:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: HealthSync/HealthSync.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    attributes:
      SystemCapabilities:
        com.apple.HealthKit:
          enabled: 1
    sources:
      - HealthSync
      - SharedAssets.xcassets
    info:
      path: HealthSync/Info.plist
      properties:
        NSHealthShareUsageDescription: "We need access to your health data to sync it to your Android device."
        NSHealthUpdateUsageDescription: "We need access to your health data to sync it."
        NSLocalNetworkUsageDescription: "We need access to the local network to find the Android synchronization server."
        NSBonjourServices: ["_http._tcp"]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
        UIRequiresFullScreen: true
    settings:
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "" # Needs to be selected in Xcode or left empty for personal team auto-signing
      ENABLE_BITCODE: NO
      SWIFT_VERSION: 6.0
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: HealthSyncWatch

  HealthSyncWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    entitlements:
      path: HealthSyncWatch/HealthSyncWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    attributes:
      SystemCapabilities:
        com.apple.HealthKit:
          enabled: 1
    sources:
      - HealthSyncWatch
      - SharedAssets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.bulbadyshka.HealthSync.watchkitapp
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: 6.0
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.bulbadyshka.HealthSync
      INFOPLIST_KEY_WKWatchOnly: NO
      INFOPLIST_KEY_NSHealthShareUsageDescription: "We need access to your workout data."
      INFOPLIST_KEY_NSHealthUpdateUsageDescription: "We need access to save workout data."
      INFOPLIST_KEY_UIBackgroundModes: ["location", "workout-processing"]
