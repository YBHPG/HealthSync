name: Build and Release Apps

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Extract Version
        id: get_version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          VERSION_CODE=${{ github.run_number }}
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Bump Android Version
        working-directory: ./android
        run: |
          sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Sign APK
        working-directory: ./android
        run: |
          # Generate a temporary keystore to sign the APK so it can be installed on devices
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=HealthSync, OU=HealthSync, O=HealthSync, L=Unknown, ST=Unknown, C=US"
          # Find apksigner
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -r | head -n 1)
          # Sign the apk
          $APKSIGNER sign --ks release.keystore --ks-pass pass:password --key-pass pass:password --out HealthSync-Android-v${VERSION}.apk app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: android/HealthSync-Android-v*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    name: Build iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Extract Version
        id: get_version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          VERSION_CODE=${{ github.run_number }}
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Generate Xcode Project
        working-directory: ./ios
        run: xcodegen generate

      - name: Bump iOS Version
        working-directory: ./ios
        run: |
          # Modify Info.plist directly for the App
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" HealthSync/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION_CODE" HealthSync/Info.plist

      - name: Build App
        working-directory: ./ios
        run: |
          xcodebuild clean build \
            -project HealthSync.xcodeproj \
            -scheme HealthSync \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            MARKETING_VERSION=$VERSION \
            CURRENT_PROJECT_VERSION=$VERSION_CODE \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        working-directory: ./ios
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/HealthSync.app Payload/
          
          # AltStore does NOT support sideloading Watch apps and will crash trying to resign it.
          # We must strip the Watch app from the IPA meant for sideloading.
          rm -rf Payload/HealthSync.app/Watch
          
          zip -r HealthSync-iOS-v${VERSION}.ipa Payload

      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ios/HealthSync-iOS-v*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AltSource JSON
        run: |
          # Fetch and checkout the latest master branch to avoid push rejections
          git fetch origin master
          git checkout master
          
          size=$(stat -f%z ios/HealthSync-iOS-v${VERSION}.ipa)
          date=$(date -u +"%Y-%m-%d")
          
          # Create a JSON object for the new version
          version_obj="{\"version\":\"$VERSION\",\"buildVersion\":\"$VERSION_CODE\",\"date\":\"$date\",\"downloadURL\":\"https://github.com/${{ github.repository }}/releases/download/v$VERSION/HealthSync-iOS-v${VERSION}.ipa\",\"size\":$size,\"minOSVersion\":\"15.0\"}"
          
          # Use jq to prepend the new version to the versions array
          jq ".apps[0].versions |= [$version_obj] + ." altsource.json > tmp.json && mv tmp.json altsource.json
          
          # Commit and push back to master branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altsource.json
          git commit -m "chore: update AltSource JSON for release v$VERSION"
          git push origin master
